<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading HICMS...</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;400;500;600;700;800;900&display=swap");

    :root {
      --bg: #080c14;
      --surface-0: #0f1520;
      --text-primary: #e8edf7;
      --text-secondary: #8fa3c4;
      --text-tertiary: #586b8a;
      --accent-primary: #3b82f6;
      --accent-ring: rgba(59, 130, 246, 0.2);
      --font-display: "Instrument Serif", Georgia, serif;
      --font-ui: "DM Sans", system-ui, sans-serif;
      --font-mono: "IBM Plex Mono", "Courier New", monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-ui);
      background-color: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      -webkit-app-region: drag; /* Allows moving the borderless splash window */
      user-select: none;
    }

    /* Subtle grid texture overlay */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      opacity: 0.8;
      mask-image: radial-gradient(circle, black 40%, transparent 90%);
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      max-width: 420px;
      padding: 20px;
    }

    .logo-container {
      position: relative;
      width: 60px;
      height: 60px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1a3a8f 0%, #3b82f6 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 24px;
      font-weight: 600;
      color: #ffffff;
      box-shadow: 0 0 24px rgba(59, 130, 246, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 8px;
    }

    .logo-container::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 16px;
      border: 1px dashed rgba(59, 130, 246, 0.3);
      animation: spin 20s linear infinite;
    }

    .brand-title {
      font-family: var(--font-display);
      font-size: 38px;
      font-style: italic;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      background: linear-gradient(to right, #ffffff 30%, #a3b8cc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-subtitle {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-secondary);
      margin-top: -8px;
    }

    .spinner-box {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(59, 130, 246, 0.1);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.1);
    }

    .status-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.05em;
      animation: pulse 2s ease-in-out infinite;
    }

    .footer {
      position: absolute;
      bottom: 24px;
      font-family: var(--font-mono);
      font-size: 9px;
      color: rgba(88, 107, 138, 0.4);
      letter-spacing: 0.05em;
      z-index: 10;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.6;
      }
      50% {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      M
    </div>
    <div>
      <h1 class="brand-title">Malavia Ledger</h1>
      <p class="brand-subtitle">Claims Management System</p>
    </div>
    <div class="spinner-box">
      <div class="spinner"></div>
      <div class="status-text" id="status">INITIALIZING SYSTEM ENVIRONMENT...</div>
    </div>
  </div>
  <div class="footer">
    HICMS OBSIDIAN LEDGER PORTAL • VER 1.0.0
  </div>

  <script>
    const statuses = [
      "ESTABLISHING SECURE CONNECTION...",
      "VERIFYING SYSTEM CRYPTO ENVIRONMENT...",
      "RESOLVING LOCAL PORT ALLOCATIONS...",
      "SYNCING SECURE DIST DATA...",
      "MOUNTING TRANSACTION LEDGERS..."
    ];
    let index = 0;
    const statusEl = document.getElementById("status");
    setInterval(() => {
      index = (index + 1) % statuses.length;
      statusEl.textContent = statuses[index];
    }, 1800);
  </script>
</body>
</html>
