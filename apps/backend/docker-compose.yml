version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hicms-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - hicms-network

  backend:
    build: .
    container_name: hicms-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/hicms
      - JWT_ACCESS_SECRET=your_super_secret_access_key
      - JWT_REFRESH_SECRET=your_super_secret_refresh_key
      - PORTAL_PASSWORD_SECRET=your_super_secret_portal_key
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - hicms-network

networks:
  hicms-network:
    driver: bridge

volumes:
  mongo-data:
