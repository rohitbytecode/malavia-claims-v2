# ── Malavia Claims – Nginx Reverse Proxy ──────────────────────────
# Place this in your nginx/conf/ directory (e.g. C:/nginx/conf/nginx.conf)
# or include it from the main nginx.conf

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       "C:/nginx/conf/mime.types";
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # ── Upstream: Backend API (HTTPS) ────────────────────────────
    upstream backend {
        server 127.0.0.1:3443;
    }

    # ── HTTPS Server ─────────────────────────────────────────────
    server {
        listen       443 ssl;

        # Accept connections on both localhost and the DHCP-reserved IP
        server_name  localhost 192.168.1.13;

        # SSL certificates (use the same ones backend uses, or generate new ones)
        ssl_certificate      "D:/Rohit 2.0/Programing projects/Malavia-claim/apps/backend/cert/cert.pem";
        ssl_certificate_key  "D:/Rohit 2.0/Programing projects/Malavia-claim/apps/backend/cert/key.pem";

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Frontend: Serve static files ─────────────────────────
        location / {
            root "D:/Rohit 2.0/Programing projects/Malavia-claim/apps/frontend/dist";
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── API: Proxy to backend ────────────────────────────────
        location /api/ {
            proxy_pass         https://backend;
            proxy_ssl_verify   off;   # Self-signed cert on backend

            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout  60s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
        }

        # ── Socket.io: WebSocket proxy ───────────────────────────
        location /socket.io/ {
            proxy_pass         https://backend;
            proxy_ssl_verify   off;

            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout  60s;
            proxy_send_timeout     300s;
            proxy_read_timeout     300s;
        }
    }

    # ── Optional: Redirect HTTP → HTTPS ──────────────────────────
    server {
        listen       80;
        server_name  localhost 192.168.1.13;
        return 301   https://$host$request_uri;
    }
}
